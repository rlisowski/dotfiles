# List of plugins
# Supports `github_username/repo` or full git URLs
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'fcsonline/tmux-thumbs'

run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

set -g @batt_remain_short true

set-option -sg escape-time 50

set -g default-command /opt/homebrew/bin/zsh
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

# set-option -ga terminal-overrides ",xterm-256color:Tc"
# set-option -ga terminal-overrides ",*256col*:Tc"
# set -g default-terminal "xterm-256color"
# set-option -ga terminal-overrides ",xterm-256color:Tc"
# set -g default-terminal "screen-256color"
# set-option -ga terminal-overrides ",*256col*:Tc"
# set-option -ga terminal-overrides ",xterm-256color:Tc"
# set -g default-terminal "rxvt-unicode-256color"
# set -ga terminal-overrides ',xterm-256color:Tc'
# set -g default-terminal "tmux-256color"
# set -as terminal-overrides ',xterm*:sitm=\E[3m'

set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:RGB'
set -as terminal-overrides ',xterm-256color:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',xterm-256color:Setno=\E[58:2::%p1%{65536}%/%d:%p1%{256}%/%{255}%&%d:%p1%{255}%&%d m' # underscore colors
set -as terminal-features 'xterm-256color:clipboard:ccolour:cstyle:extkeys'

set -s extended-keys on
set-window-option -g xterm-keys on # to make ctrl-arrow, etc. work

# tmux-resurrect
set -g @resurrect-processes 'ssh psql mysql sqlite3 irb pry echo'
set -g @resurrect-strategy-vim "session"

# Smart pane switching with awareness of vim splits
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
# is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^X ] +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
# bind -n 'C-\' if-shell "$is_vim" "send-keys 'C-\\'" "select-pane -l"

bind -n "M-H" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -L; tmux swap-pane -t $old'
bind -n "M-J" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -D; tmux swap-pane -t $old'
bind -n "M-K" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -U; tmux swap-pane -t $old'
bind -n "M-L" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -R; tmux swap-pane -t $old'
bind -n "M-S-Left" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -L; tmux swap-pane -t $old'
bind -n "M-S-Down" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -D; tmux swap-pane -t $old'
bind -n "M-S-Up" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -U; tmux swap-pane -t $old'
bind -n "M-S-Right" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -R; tmux swap-pane -t $old'

# bind C-n select-pane -t :.+
# pane movement
bind j command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind s command-prompt -p "send pane to:"  "join-pane -t '%%'"

bind C-l send-keys 'C-l'

# act like GNU screen
# bind C-b last-window
unbind C-p
bind C-p previous-window
bind C-n next-window

bind-key -n C-S-Left { swap-window -t -1; select-window -t -1 }
bind-key -n C-S-Right { swap-window -t +1; select-window -t +1 }

bind C-b send-keys 't && exit' 'C-m'
bind K run-shell 'tmux switch-client -n \; kill-session -t "$(tmux display-message -p "#S")" || tmux kill-session'

# Less stretching to get to the first item.
set -g base-index 1
setw -g pane-base-index 1

# Reload the config.
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Saner splitting.
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind S choose-session
bind s choose-tree

# DVTM style pane selection
unbind 1        ; bind 1        select-window -t 1
unbind 2        ; bind 2        select-window -t 2
unbind 3        ; bind 3        select-window -t 3
unbind 4        ; bind 4        select-window -t 4
unbind 5        ; bind 5        select-window -t 5
unbind 6        ; bind 6        select-window -t 6
unbind 7        ; bind 7        select-window -t 7
unbind 8        ; bind 8        select-window -t 8
unbind 9        ; bind 9        select-window -t 9
unbind 0        ; bind 0        select-window -t 10
unbind M-1      ; bind -n M-1   select-window -t 1
unbind M-2      ; bind -n M-2   select-window -t 2
unbind M-3      ; bind -n M-3   select-window -t 3
unbind M-4      ; bind -n M-4   select-window -t 4
unbind M-5      ; bind -n M-5   select-window -t 5
unbind M-6      ; bind -n M-6   select-window -t 6
unbind M-7      ; bind -n M-7   select-window -t 7
unbind M-8      ; bind -n M-8   select-window -t 8
unbind M-9      ; bind -n M-9   select-window -t 9
unbind M-0      ; bind -n M-0   select-window -t 10

# Pane resizing
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# bind -n M-k send-keys -R \; clear-history

# Window movement
# Only really makes sense if you have your parens bound to shifts like me.
#bind -r ( select-window -t :-
#bind -r ) select-window -t :+

set -g status-interval 5

set -g status-keys "emacs"

set -g set-titles on
set -g set-titles-string "#W : #T"

# Activity
setw -g monitor-activity off
set -g visual-activity on
set-option -g bell-action none

# Autorename sanely.
setw -g automatic-rename on
setw -g allow-rename on

# Better name management
bind C new-window \; command-prompt "rename-window '%%'"
bind c new-window
#bind , command-prompt "rename-window '%%'"
set -g renumber-windows on
bind space next-layout


# Copy mode
setw -g mode-keys vi
# bind [ copy-mode
bind -T copy-mode-vi 'v' send -X begin-selection
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
unbind -T root MouseDown3Pane


unbind p
bind p paste-buffer
# bind -t vi-copy v begin-selection
# bind -t vi-copy y copy-selection

# Setup 'v' to begin selection as in Vim
# bind -t vi-copy v begin-selection
# bind -t vi-copy y copy-pipe "reattach-to-user-namespace pbcopy"

# Update default binding of `Enter` to also use copy-pipe
# unbind -t vi-copy Enter
# bind -t vi-copy Enter copy-pipe "reattach-to-user-namespace pbcopy"

setw -g mouse on

set -g set-clipboard on

set -g history-limit 50000

bind b break-pane -d

source ~/.tmux.line.conf

run '~/.tmux/plugins/tpm/tpm'
